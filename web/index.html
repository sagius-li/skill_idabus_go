<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Idabus Chat</title>
    <link rel="stylesheet" href="/assets/styles.css?v=stream-1">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Custom AI Workspace</p>
        <h1>Chat With AI And Let It Use Idabus When Needed</h1>
        <p class="subtitle">
          The assistant can answer directly or decide to call the local <code>idabus-go</code> tool chain for multi-step jobs.
        </p>
      </section>

      <section class="chat-panel">
        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <label class="sr-only" for="message-input">Message</label>
          <textarea id="message-input" rows="3" placeholder="Ask something about Idabus..." required></textarea>
          <div class="composer-row">
            <p id="status" class="status">Ready</p>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/assets/app.js?v=stream-1"></script>
  </body>
</html>
